<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #1b1b1b;
      border: 1px solid #2d2d2d;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    p {
      margin: 0 0 18px;
      color: #cfcfcf;
      line-height: 1.5;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }
    input, select, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #3a3a3a;
      padding: 12px 14px;
      font-size: 16px;
    }
    input, select {
      background: #0f0f0f;
      color: #f5f5f5;
      margin-bottom: 14px;
    }
    button {
      background: #f5f5f5;
      color: #111;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { opacity: 0.92; }
    .row {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 12px;
    }
    .output {
      margin-top: 22px;
      background: #fff;
      border-radius: 16px;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #qrcode img, #qrcode canvas {
      max-width: 100%;
      height: auto;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 14px;
    }
    .actions button {
      flex: 1;
    }
    .secondary {
      background: transparent;
      color: #f5f5f5;
      border: 1px solid #4a4a4a;
    }
    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>QR Code Generator</h1>
    <p>Paste any link or text, choose a size, then generate and download your QR code.</p>

    <label for="qrText">URL or text</label>
    <input id="qrText" type="text" placeholder="https://example.com" value="https://linktr.ee/thatguysoto" />

    <div class="row">
      <div>
        <label for="fileName">File name</label>
        <input id="fileName" type="text" placeholder="my-qr-code" value="my-qr-code" />
      </div>
      <div>
        <label for="qrSize">Size</label>
        <select id="qrSize">
          <option value="200">200 px</option>
          <option value="256" selected>256 px</option>
          <option value="320">320 px</option>
          <option value="512">512 px</option>
        </select>
      </div>
    </div>

    <button id="generateBtn">Generate QR Code</button>

    <div class="output">
      <div id="qrcode" aria-label="Generated QR code"></div>
    </div>

    <div class="actions">
      <button id="downloadBtn" class="secondary">Download PNG</button>
      <button id="clearBtn" class="secondary">Clear</button>
    </div>
  </div>

  <script>
    const qrText = document.getElementById('qrText');
    const qrSize = document.getElementById('qrSize');
    const fileName = document.getElementById('fileName');
    const qrcodeContainer = document.getElementById('qrcode');
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');

    let qr;

    function generateQR() {
      const text = qrText.value.trim();
      const size = parseInt(qrSize.value, 10);

      qrcodeContainer.innerHTML = '';

      if (!text) {
        qrcodeContainer.innerHTML = '<span style="color:#666;font-weight:700;">Enter text or a URL first</span>';
        return;
      }

      qr = new QRCode(qrcodeContainer, {
        text,
        width: size,
        height: size,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    }

    function downloadQR() {
      const canvas = qrcodeContainer.querySelector('canvas');
      const img = qrcodeContainer.querySelector('img');
      const safeName = (fileName.value.trim() || 'qr-code').replace(/[^a-z0-9-_]/gi, '_');

      if (canvas) {
        const link = document.createElement('a');
        link.download = `${safeName}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        return;
      }

      if (img) {
        const link = document.createElement('a');
        link.download = `${safeName}.png`;
        link.href = img.src;
        link.click();
        return;
      }

      alert('Generate a QR code first.');
    }

    function clearQR() {
      qrcodeContainer.innerHTML = '';
      qrText.value = '';
    }

    generateBtn.addEventListener('click', generateQR);
    downloadBtn.addEventListener('click', downloadQR);
    clearBtn.addEventListener('click', clearQR);
    qrText.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generateQR();
    });

    generateQR();
  </script>
</body>
</html>
